name: CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  test:
    name: Rust quality gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        run: rustup toolchain install stable --profile minimal --component rustfmt --component clippy

      - name: Select Rust
        run: rustup override set stable

      - name: Format
        run: cargo fmt --check

      - name: Test
        run: cargo test

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build
        run: cargo build

      - name: Python tool tests
        run: python3 -m unittest discover -s tools -p 'test_*.py'

      - name: Effect measurement
        run: |
          python3 tools/measure_effect.py > /tmp/workspace-effect.json
          python3 tools/check_effect_thresholds.py /tmp/workspace-effect.json
          python3 tools/summarize_effect.py /tmp/workspace-effect.json > /tmp/workspace-effect.md
